apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement
  labels:
    app: settlement
spec:
  replicas: 2
  selector:
    matchLabels:
      app: settlement
  template:
    metadata:
      labels:
        app: settlement
    spec:
      containers:
        - name: settlement
          image: settlement:latest
          # 레지스트리가 없으므로 반드시 IfNotPresent (또는 Never)로 고정
          # Always로 두면 pull 시도 후 로컬에 없다며 실패함
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
