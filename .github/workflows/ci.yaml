name: FastAPI Settlement CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-security:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Run unit tests with coverage (min 70%)
        env:
          PYTHONPATH: src
        run: |
          pytest -v \
            --cov=settlement \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Trivy security scan (filesystem)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"

      - name: Build Docker image
        run: docker build -t settlement .

      - name: Trivy security scan (docker image)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: "image"
          image-ref: "settlement"
          format: "table"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
